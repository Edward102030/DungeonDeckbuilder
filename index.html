<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legends of the Five Realms</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="game-header">
        <button id="btn-menu" class="header-btn">MENU</button>
        <h1 class="game-title">LEGENDS OF THE FIVE REALMS</h1>
        <div class="header-right">
            <button id="btn-log" class="header-btn">LOG</button>
            <button id="btn-settings" class="header-btn">SETTINGS</button>
        </div>
    </header>

    <main class="game-board">
        
        <section class="sidebar-left">
            <div class="deck-zone draw-deck">
                <span class="zone-label">DRAW CARD</span>
                <div class="deck-count">56</div>
            </div>
            
            <div id="opponent-1" class="player-station opponent left-station"></div>

            <div class="deck-zone discard-deck">
                <span class="zone-label">DISCARD CARD</span>
                <div class="discard-count">0</div>
            </div>
        </section>

        <section class="center-arena">
            
            <div id="opponent-2" class="player-station opponent top-station"></div>

            <div class="battle-circle">
                <div class="inner-circle">
                    <span class="circle-label">PREVIOUS CARD PLACED</span>
                    <div id="center-played-card-slot"></div>
                </div>
            </div>

            <div class="my-character-block">
                <span class="block-title">My character</span>
                <div class="hero-info-hud">
                    <h2 class="hero-name">Loading Hero...</h2>
                    <div id="local-health" class="health-bar"></div>
                </div>
                <div class="equipment-row">
                    <span>Weapon</span><span>Armor</span><span>Mount</span><span>Relic</span><span>Banner</span>
                </div>
            </div>
        </section>

        <section class="sidebar-right">
            <div class="turn-indicator-box">
                <span class="box-label">Whos Turn</span>
                <div id="current-turn-display">Player</div>
            </div>

            <div id="opponent-3" class="player-station opponent right-station"></div>

            <div class="action-panel-right">
                <div class="phase-list">
                    <div class="phase-item" data-phase="prep">180</div>
                    <div class="phase-item" data-phase="draw">Draw</div>
                    <div class="phase-item" data-phase="action">Action</div>
                    <div class="phase-item" data-phase="discard">Discard</div>
                    <div class="phase-item" data-phase="end">End</div>
                </div>
                <button id="btn-end-phase" class="end-turn-btn">End Phase</button>
            </div>
        </section>

    </main>

    <footer class="player-hand-area">
        <span class="hand-label">HAND CARDS</span>
        <div id="player-hand" class="cards-fan-container"></div>
    </footer>

    <div id="modal-container" class="hidden">
        <div id="modal-settings" class="modal-content hidden">
            <h3>Settings</h3>
            <button class="close-modal">Close</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
